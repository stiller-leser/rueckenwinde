<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kosten-Schnellrechner Panamericana</title>
  <style>
    :root {
      --bg-1: #f3eee2;
      --bg-2: #dbe8e1;
      --card: rgba(255, 255, 255, 0.86);
      --text: #16342f;
      --muted: #4b6962;
      --primary: #1f7a6d;
      --primary-strong: #155f55;
      --accent: #f0a45b;
      --accent-soft: #f8d8b6;
      --line: rgba(22, 52, 47, 0.14);
      --shadow: 0 18px 40px rgba(16, 38, 34, 0.15);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "League Spartan", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #fff6dc 0%, transparent 35%),
        radial-gradient(circle at 80% 20%, #d4efe7 0%, transparent 42%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .rechner {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      background: linear-gradient(120deg, rgba(31, 122, 109, 0.14), rgba(240, 164, 91, 0.24));
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 3.2vw, 2.35rem);
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      padding: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.66);
      padding: 18px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 700;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.92rem;
    }

    .option-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      font: inherit;
      color: inherit;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
      min-height: 64px;
      display: grid;
      place-items: center;
      gap: 4px;
    }

    .option small {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .option:hover {
      transform: translateY(-2px);
      border-color: rgba(31, 122, 109, 0.45);
      box-shadow: 0 10px 20px rgba(17, 55, 49, 0.1);
    }

    .option.active {
      border-color: var(--primary);
      background: linear-gradient(150deg, rgba(31, 122, 109, 0.12), rgba(240, 164, 91, 0.16));
      box-shadow: 0 10px 22px rgba(21, 95, 85, 0.16);
      font-weight: 700;
    }

    .vehicle .option {
      min-height: 82px;
    }

    .icon {
      font-size: 1.25rem;
      line-height: 1;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 6px;
      background: #fff;
    }

    .counter button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      background: rgba(31, 122, 109, 0.1);
      color: var(--primary-strong);
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .counter button:hover {
      transform: scale(1.06);
      background: rgba(31, 122, 109, 0.2);
    }

    .counter-value {
      min-width: 34px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .output {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(165deg, #ffffff, #f6fbf8);
      padding: 18px;
    }

    .result-title {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-value {
      margin: 8px 0 0;
      font-size: clamp(1.5rem, 3.3vw, 2.3rem);
      font-weight: 800;
      color: var(--primary-strong);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .result-value.update {
      transform: scale(1.03);
      opacity: 0.8;
    }

    .driver {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(120deg, rgba(240, 164, 91, 0.2), rgba(240, 164, 91, 0.08));
      border: 1px solid rgba(195, 115, 45, 0.23);
    }

    .driver strong {
      display: block;
      margin-bottom: 4px;
    }

    .formula {
      font-size: 0.93rem;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .option-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="rechner" aria-label="Kosten-Schnellrechner Panamericana">
    <header class="header">
      <h1 class="title">Panamericana Kosten-Schnellrechner</h1>
      <p class="subtitle">Schnelle Monatskalkulation für eure Reiseplanung auf rueckenwind.de</p>
    </header>

    <section class="grid">
      <div class="panel">
        <div class="section" id="style-section">
          <div class="label">
            <span>Reisestil</span>
            <span class="hint">Budget pro Person und Monat</span>
          </div>
          <div class="option-row" data-group="style">
            <button class="option active" type="button" data-value="low">Low Budget<small>400 €</small></button>
            <button class="option" type="button" data-value="mittel">Mittel<small>800 €</small></button>
            <button class="option" type="button" data-value="komfort">Komfort<small>1400 €</small></button>
          </div>
        </div>

        <div class="section">
          <div class="label">
            <span>Dauer</span>
            <span class="hint"><span id="duration-value">12</span> Monate</span>
          </div>
          <input id="duration" type="range" min="3" max="24" value="12" step="1" />
        </div>

        <div class="section vehicle">
          <div class="label">
            <span>Fahrzeug</span>
            <span class="hint">Betrieb + Verschiffung</span>
          </div>
          <div class="option-row" data-group="vehicle">
            <button class="option active" type="button" data-value="klein">
              <span class="icon" aria-hidden="true">🏍️</span>
              Motorrad/Kleinwagen
            </button>
            <button class="option" type="button" data-value="van">
              <span class="icon" aria-hidden="true">🚐</span>
              Van/4x4
            </button>
            <button class="option" type="button" data-value="lkw">
              <span class="icon" aria-hidden="true">🚚</span>
              LKW/Expeditionsmobil
            </button>
          </div>
        </div>

        <div class="section">
          <div class="label">
            <span>Personen</span>
            <span class="hint">1 bis 5</span>
          </div>
          <div class="counter" aria-label="Personenzahl auswählen">
            <button type="button" id="decrease" aria-label="Personen verringern">−</button>
            <span class="counter-value" id="people-value">2</span>
            <button type="button" id="increase" aria-label="Personen erhöhen">+</button>
          </div>
        </div>
      </div>

      <aside class="output">
        <div class="result-card">
          <h2 class="result-title">Monatliche Kostenspanne</h2>
          <p class="result-value" id="result-range">0 € – 0 €</p>
          <p class="formula" id="result-detail"></p>
        </div>

        <div class="driver" id="cost-driver">
          <strong>Größter Kostentreiber</strong>
          <span id="driver-text">-</span>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const basiswerte = {
      low: 400,
      mittel: 800,
      komfort: 1400
    };

    const fahrzeugkosten = {
      klein: 300,
      van: 600,
      lkw: 1000
    };

    const verschiffung = {
      klein: 2000,
      van: 3500,
      lkw: 6000
    };

    const state = {
      style: "low",
      vehicle: "klein",
      duration: 12,
      people: 2
    };

    const durationInput = document.getElementById("duration");
    const durationValue = document.getElementById("duration-value");
    const peopleValue = document.getElementById("people-value");
    const resultRange = document.getElementById("result-range");
    const resultDetail = document.getElementById("result-detail");
    const driverText = document.getElementById("driver-text");
    const decreaseBtn = document.getElementById("decrease");
    const increaseBtn = document.getElementById("increase");

    function formatEuro(value) {
      return Math.round(value).toLocaleString("de-DE") + " €";
    }

    function getCostDriver() {
      if (state.vehicle === "lkw") {
        return "Treibstoff & Verschiffung";
      }

      if (state.style === "komfort") {
        return "Lebenshaltung & Unterkunft";
      }

      if (state.duration <= 6) {
        return "Verschiffung (kurze Reisedauer)";
      }

      if (state.people >= 4) {
        return "Lebenshaltung für mehrere Personen";
      }

      if (state.vehicle === "van") {
        return "Fahrzeugbetrieb & Wartung";
      }

      return "Laufende Reiseausgaben";
    }

    function updateResult() {
      const basis = basiswerte[state.style] * state.people;
      const fahrzeug = fahrzeugkosten[state.vehicle];
      const shipMonthly = verschiffung[state.vehicle] / state.duration;
      const totalMonthly = basis + fahrzeug + shipMonthly;
      const min = totalMonthly * 0.9;
      const max = totalMonthly * 1.1;

      resultRange.classList.add("update");
      window.setTimeout(() => resultRange.classList.remove("update"), 220);

      resultRange.textContent = `${formatEuro(min)} – ${formatEuro(max)}`;
      resultDetail.textContent = `Rechnung: ((${formatEuro(basiswerte[state.style])} × ${state.people}) + ${formatEuro(fahrzeug)}) + (${formatEuro(verschiffung[state.vehicle])} / ${state.duration}) = ca. ${formatEuro(totalMonthly)} / Monat`;
      driverText.textContent = getCostDriver();
    }

    function setActiveOption(group, value) {
      const buttons = document.querySelectorAll(`[data-group="${group}"] .option`);
      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.value === value);
      });
    }

    document.querySelectorAll('[data-group="style"] .option').forEach((btn) => {
      btn.addEventListener("click", () => {
        state.style = btn.dataset.value;
        setActiveOption("style", state.style);
        updateResult();
      });
    });

    document.querySelectorAll('[data-group="vehicle"] .option').forEach((btn) => {
      btn.addEventListener("click", () => {
        state.vehicle = btn.dataset.value;
        setActiveOption("vehicle", state.vehicle);
        updateResult();
      });
    });

    durationInput.addEventListener("input", () => {
      state.duration = Number(durationInput.value);
      durationValue.textContent = state.duration;
      updateResult();
    });

    decreaseBtn.addEventListener("click", () => {
      state.people = Math.max(1, state.people - 1);
      peopleValue.textContent = state.people;
      updateResult();
    });

    increaseBtn.addEventListener("click", () => {
      state.people = Math.min(5, state.people + 1);
      peopleValue.textContent = state.people;
      updateResult();
    });

    updateResult();
  </script>
</body>
</html>
